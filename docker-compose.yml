services:
  postgres:
    image: postgres:15-alpine
    container_name: nqswap_postgres
    environment:
      POSTGRES_USER: indexer
      POSTGRES_PASSWORD: indexer_secret
      POSTGRES_DB: nqswap_indexer
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U indexer"]
      interval: 5s
      timeout: 5s
      retries: 5

  indexer:
    build: .
    container_name: nqswap_indexer
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - NODE_ENV=development
    ports:
      - "3000:3000"
    volumes:
      - ./src:/app/src
      - ./logs:/app/logs
    command: npm run dev

volumes:
  postgres_data:
